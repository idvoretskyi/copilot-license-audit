name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, in addition to push/PR triggers, so refactors that don't
    # touch a given code path still get periodically re-scanned.
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload results to the Security tab
      contents: read
    # Code scanning requires GitHub Advanced Security on private repos.
    # This repo is private today; skip cleanly rather than fail until it's
    # made public (or GHAS is enabled), at which point this condition is a
    # no-op and the job runs normally.
    if: ${{ !github.event.repository.private }}
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: go
          build-mode: autobuild

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:go"
