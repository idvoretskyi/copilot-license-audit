name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, in addition to push/PR triggers, so refactors that don't
    # touch a given code path still get periodically re-scanned.
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload results to the Security tab
      contents: read
    # Code scanning requires GitHub Advanced Security on private repos.
    # This repo is private today; skip cleanly rather than fail until it's
    # made public (or GHAS is enabled), at which point this condition is a
    # no-op and the job runs normally.
    if: ${{ !github.event.repository.private }}
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
          build-mode: autobuild

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
