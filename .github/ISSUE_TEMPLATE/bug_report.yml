name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Please **do not** include real enterprise slugs, org names,
        usernames, tokens, or billing figures — use placeholders like
        `my-enterprise` and redact numbers if needed.

        If this is a **security** issue, please use
        [private vulnerability reporting](https://github.com/idvoretskyi/copilot-license-audit/security/advisories/new)
        instead of a public issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `copilot-license-audit --version`
      placeholder: "copilot-license-audit v1.2.3"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version (if built from source)
      placeholder: "go version go1.26 linux/amd64"

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact command you ran (redact `--enterprise` if needed)
      render: bash
      placeholder: "copilot-license-audit --enterprise my-enterprise audit --strict"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error/output if possible (redacted as needed)
      render: text
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (only relevant if it doesn't identify a specific enterprise/org/user)
